<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bright Star International School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                            950: '#172554'
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .login-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 40%, #172554 100%);
        }
        .card-shadow {
            box-shadow: 0 25px 60px -12px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.05);
        }
        .input-focus:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
    </style>
</head>
<body class="login-bg min-h-screen flex items-center justify-center py-8">
    <div class="max-w-md w-full mx-4">
        <!-- Login Card -->
        <div class="bg-white rounded-2xl card-shadow overflow-hidden">
            <!-- Logo & Header -->
            <div class="px-8 pt-8 pb-6 text-center border-b border-slate-100">
                <a href="/" class="inline-flex items-center space-x-3 mb-4">
                    <img src="/images/logo.jpeg" alt="Bright Star Logo" class="w-14 h-14 rounded-xl object-cover shadow-md">
                </a>
                <h1 class="text-xl font-bold text-slate-900">Bright Star International School</h1>
                <p class="text-slate-500 text-sm mt-1">Sign in to access your portal</p>
            </div>

            <div class="p-8">
                <!-- Role Selection -->
                <div class="flex mb-6 bg-slate-100 rounded-xl p-1">
                    <button id="studentBtn" onclick="selectRole('student')" class="flex-1 py-2.5 px-4 rounded-lg text-sm font-semibold transition bg-white text-brand-600 shadow-sm">
                        <i class="fas fa-user-graduate mr-1"></i> Student
                    </button>
                    <button id="teacherBtn" onclick="selectRole('teacher')" class="flex-1 py-2.5 px-4 rounded-lg text-sm font-semibold transition text-slate-500 hover:text-slate-700">
                        <i class="fas fa-chalkboard-teacher mr-1"></i> Teacher
                    </button>
                    <button id="adminBtn" onclick="selectRole('admin')" class="flex-1 py-2.5 px-4 rounded-lg text-sm font-semibold transition text-slate-500 hover:text-slate-700">
                        <i class="fas fa-user-shield mr-1"></i> Admin
                    </button>
                </div>

                <!-- Login Form -->
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <input type="hidden" id="role" value="student">
                    
                    <div id="studentFields">
                        <div class="mb-5">
                            <label class="block text-slate-700 text-sm font-medium mb-2">Admission Number</label>
                            <div class="relative">
                                <span class="absolute left-3.5 top-3 text-slate-400"><i class="fas fa-id-card"></i></span>
                                <input type="text" id="identifier" placeholder="e.g., BSS/2026/001" 
                                    class="w-full pl-11 pr-4 py-3 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:border-brand-500 input-focus transition"
                                    required>
                            </div>
                        </div>
                    </div>

                    <div id="teacherFields" class="hidden">
                        <div class="mb-5">
                            <label class="block text-slate-700 text-sm font-medium mb-2">Staff ID</label>
                            <div class="relative">
                                <span class="absolute left-3.5 top-3 text-slate-400"><i class="fas fa-id-badge"></i></span>
                                <input type="text" id="teacherIdentifier" placeholder="e.g., TCH/001" 
                                    class="w-full pl-11 pr-4 py-3 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:border-brand-500 input-focus transition">
                            </div>
                        </div>
                    </div>

                    <div id="adminFields" class="hidden">
                        <div class="mb-5">
                            <label class="block text-slate-700 text-sm font-medium mb-2">Email Address</label>
                            <div class="relative">
                                <span class="absolute left-3.5 top-3 text-slate-400"><i class="fas fa-envelope"></i></span>
                                <input type="email" id="adminIdentifier" placeholder="admin@brightstar.com" 
                                    class="w-full pl-11 pr-4 py-3 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:border-brand-500 input-focus transition">
                            </div>
                        </div>
                    </div>

                    <div class="mb-5">
                        <label class="block text-slate-700 text-sm font-medium mb-2">Password</label>
                        <div class="relative">
                            <span class="absolute left-3.5 top-3 text-slate-400"><i class="fas fa-lock"></i></span>
                            <input type="password" id="password" placeholder="Enter your password" 
                                class="w-full pl-11 pr-12 py-3 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:border-brand-500 input-focus transition"
                                required>
                            <button type="button" onclick="togglePassword()" class="absolute right-3.5 top-3 text-slate-400 hover:text-slate-600 transition">
                                <i id="eyeIcon" class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center justify-between mb-6">
                        <label class="flex items-center cursor-pointer">
                            <input type="checkbox" class="rounded border-slate-300 text-brand-600 focus:ring-brand-500">
                            <span class="ml-2 text-sm text-slate-600">Remember me</span>
                        </label>
                        <a href="https://share.google/HBKujBAtycTnleiJm" target="_blank" class="text-sm text-brand-600 hover:text-brand-700 font-medium transition">Forgot Password?</a>
                    </div>

                    <div id="errorMessage" class="hidden mb-4 p-3 bg-red-50 text-red-600 rounded-xl text-sm border border-red-200"></div>

                    <button type="submit" id="loginBtn" class="w-full bg-brand-600 text-white py-3.5 rounded-xl font-semibold hover:bg-brand-700 hover:shadow-lg transition flex items-center justify-center">
                        <span id="loginText">Login as Student</span>
                        <i id="loginSpinner" class="fas fa-spinner fa-spin ml-2 hidden"></i>
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <a href="/" class="text-slate-500 hover:text-slate-700 text-sm transition">
                        <i class="fas fa-arrow-left mr-1"></i> Back to Home
                    </a>
                </div>
            </div>
        </div>

        <!-- Demo Credentials -->
        <div class="mt-6 bg-white/5 backdrop-blur rounded-xl p-5 border border-white/10">
            <h4 class="text-white font-semibold mb-3 text-sm"><i class="fas fa-info-circle mr-2 text-brand-400"></i>Demo Credentials</h4>
            <div class="text-slate-300 text-sm space-y-2">
                <p><strong class="text-white">Student:</strong> BSS/2026/001 / password123</p>
                <p><strong class="text-white">Teacher:</strong> TCH/001 / password123</p>
                <p><strong class="text-white">Admin:</strong> admin@brightstar.com / admin123</p>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
