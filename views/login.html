<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bright Star International School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brown: {
                            50: '#faf6f1',
                            100: '#f0e6d8',
                            200: '#e0ccb0',
                            300: '#cda87a',
                            400: '#b8844f',
                            500: '#a67035',
                            600: '#8b5a2b',
                            700: '#6b4423',
                            800: '#5d3a1a',
                            900: '#3d2511',
                            950: '#2c1810'
                        },
                        smoke: '#f5f5f5'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'Playfair Display', serif; }
        .btn-gold { background: linear-gradient(135deg, #d4a574, #b8844f); }
        .btn-gold:hover { background: linear-gradient(135deg, #b8844f, #a67035); }
        .login-bg {
            background: linear-gradient(135deg, rgba(44,24,16,0.95) 0%, rgba(93,58,26,0.9) 100%),
                        url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><rect fill="%235d3a1a" width="1200" height="800"/><g fill="%236b4423" fill-opacity="0.2"><circle cx="100" cy="100" r="80"/><circle cx="1100" cy="700" r="120"/><circle cx="600" cy="400" r="200"/></g></svg>');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="login-bg min-h-screen flex items-center justify-center py-8">
    <div class="max-w-md w-full mx-4">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="/" class="inline-flex items-center space-x-4">
                <div class="w-16 h-16 btn-gold rounded-full flex items-center justify-center shadow-xl">
                    <i class="fas fa-star text-white text-2xl"></i>
                </div>
                <div class="text-left">
                    <h1 class="text-2xl font-bold text-white font-display">BRIGHT STAR</h1>
                    <p class="text-xs text-brown-300 tracking-widest">INTERNATIONAL SCHOOL</p>
                </div>
            </a>
        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
            <!-- Header -->
            <div class="bg-brown-950 p-6 text-center">
                <h2 class="text-xl font-bold text-white font-display">Portal Login</h2>
                <p class="text-brown-300 text-sm mt-1">Sign in to access your account</p>
            </div>

            <div class="p-8">
                <!-- Role Selection -->
                <div class="flex mb-6 bg-brown-50 rounded-xl p-1">
                    <button id="studentBtn" onclick="selectRole('student')" class="flex-1 py-2.5 px-4 rounded-lg text-sm font-semibold transition btn-gold text-white">
                        <i class="fas fa-user-graduate mr-1"></i> Student
                    </button>
                    <button id="teacherBtn" onclick="selectRole('teacher')" class="flex-1 py-2.5 px-4 rounded-lg text-sm font-semibold transition text-brown-600 hover:text-brown-800">
                        <i class="fas fa-chalkboard-teacher mr-1"></i> Teacher
                    </button>
                    <button id="adminBtn" onclick="selectRole('admin')" class="flex-1 py-2.5 px-4 rounded-lg text-sm font-semibold transition text-brown-600 hover:text-brown-800">
                        <i class="fas fa-user-shield mr-1"></i> Admin
                    </button>
                </div>

                <!-- Login Form -->
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <input type="hidden" id="role" value="student">
                    
                    <div id="studentFields">
                        <div class="mb-5">
                            <label class="block text-brown-700 text-sm font-semibold mb-2">Admission Number</label>
                            <div class="relative">
                                <span class="absolute left-3 top-3 text-brown-400"><i class="fas fa-id-card"></i></span>
                                <input type="text" id="identifier" placeholder="e.g., BSS/2026/001" 
                                    class="w-full pl-10 pr-4 py-3 border border-brown-200 rounded-xl focus:ring-2 focus:ring-brown-500 focus:border-transparent transition"
                                    required>
                            </div>
                        </div>
                    </div>

                    <div id="teacherFields" class="hidden">
                        <div class="mb-5">
                            <label class="block text-brown-700 text-sm font-semibold mb-2">Staff ID</label>
                            <div class="relative">
                                <span class="absolute left-3 top-3 text-brown-400"><i class="fas fa-id-badge"></i></span>
                                <input type="text" id="teacherIdentifier" placeholder="e.g., TCH/001" 
                                    class="w-full pl-10 pr-4 py-3 border border-brown-200 rounded-xl focus:ring-2 focus:ring-brown-500 focus:border-transparent transition">
                            </div>
                        </div>
                    </div>

                    <div id="adminFields" class="hidden">
                        <div class="mb-5">
                            <label class="block text-brown-700 text-sm font-semibold mb-2">Email Address</label>
                            <div class="relative">
                                <span class="absolute left-3 top-3 text-brown-400"><i class="fas fa-envelope"></i></span>
                                <input type="email" id="adminIdentifier" placeholder="admin@brightstar.com" 
                                    class="w-full pl-10 pr-4 py-3 border border-brown-200 rounded-xl focus:ring-2 focus:ring-brown-500 focus:border-transparent transition">
                            </div>
                        </div>
                    </div>

                    <div class="mb-5">
                        <label class="block text-brown-700 text-sm font-semibold mb-2">Password</label>
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-brown-400"><i class="fas fa-lock"></i></span>
                            <input type="password" id="password" placeholder="Enter your password" 
                                class="w-full pl-10 pr-12 py-3 border border-brown-200 rounded-xl focus:ring-2 focus:ring-brown-500 focus:border-transparent transition"
                                required>
                            <button type="button" onclick="togglePassword()" class="absolute right-3 top-3 text-brown-400 hover:text-brown-600 transition">
                                <i id="eyeIcon" class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center justify-between mb-6">
                        <label class="flex items-center cursor-pointer">
                            <input type="checkbox" class="rounded border-brown-300 text-brown-600 focus:ring-brown-500">
                            <span class="ml-2 text-sm text-brown-600">Remember me</span>
                        </label>
                        <a href="#" class="text-sm text-brown-600 hover:text-brown-800 transition">Forgot Password?</a>
                    </div>

                    <div id="errorMessage" class="hidden mb-4 p-3 bg-red-50 text-red-600 rounded-xl text-sm border border-red-200"></div>

                    <button type="submit" id="loginBtn" class="w-full btn-gold text-white py-3.5 rounded-xl font-semibold hover:shadow-lg transition flex items-center justify-center">
                        <span id="loginText">Login as Student</span>
                        <i id="loginSpinner" class="fas fa-spinner fa-spin ml-2 hidden"></i>
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <a href="/" class="text-brown-500 hover:text-brown-700 text-sm transition">
                        <i class="fas fa-arrow-left mr-1"></i> Back to Home
                    </a>
                </div>
            </div>
        </div>

        <!-- Demo Credentials -->
        <div class="mt-6 bg-white/10 backdrop-blur rounded-xl p-5 border border-white/20">
            <h4 class="text-white font-semibold mb-3 text-sm"><i class="fas fa-info-circle mr-2 text-brown-300"></i>Demo Credentials</h4>
            <div class="text-brown-200 text-sm space-y-2">
                <p><strong class="text-white">Student:</strong> BSS/2026/001 / password123</p>
                <p><strong class="text-white">Teacher:</strong> TCH/001 / password123</p>
                <p><strong class="text-white">Admin:</strong> admin@brightstar.com / admin123</p>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
